name: icon-generator-ai-mcp
description: AI-powered icon generator ai MCP server for agents. Supports generate
  icon svg, suggest icons, convert icon format. By MEOK AI Labs.
version: 1.0.0
tools:
- name: generate_icon_svg
  description: MEOK AI Labs tool.
  parameters:
  - name: description
    type: string
    required: true
  - name: style
    type: string
    required: false
- name: suggest_icons
  description: MEOK AI Labs tool.
  parameters:
  - name: context
    type: string
    required: true
  - name: count
    type: integer
    required: false
- name: convert_icon_format
  description: MEOK AI Labs tool.
  parameters:
  - name: svg_data
    type: string
    required: true
  - name: format
    type: string
    required: false
- name: search_icon_names
  description: MEOK AI Labs tool.
  parameters:
  - name: query
    type: string
    required: true
